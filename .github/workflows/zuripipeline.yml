name: Zuriapp CI/CD Pipeline

on:
  push:
    branches: [ main ]

permissions:
  id-token: write  # Required for OIDC AWS Auth
  contents: read   # Required to read repository code

jobs:
  # -------------------------------------------------------------
  # STAGE 1: Infrastructure Security Scan & Provisioning
  # -------------------------------------------------------------
  infrastructure:
    name: Terraform & Security
    runs-on: ubuntu-latest
    # Define outputs so STAGE 3 can actually read the EC2 IP address
    outputs:
      ec2_public_ip: ${{ steps.get-outputs.outputs.ec2_public_ip }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner in IaC mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          hide-progress: false
          format: 'table'
          exit-code: '0'

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ARN_TO_ASSUME }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Get GitHub Runner Public IP
        id: get-ip
        run: |
          RUNNER_IP=$(curl -s https://ifconfig.me)
          echo "Runner IP is $RUNNER_IP"
          # Write it directly into a Terraform variables file
          echo "runner_ssh_ip=\"${RUNNER_IP}/32\"" > terraform/terraform.tfvars

      - name: Terraform Init
        run: |
          cd terraform
          terraform init

      - name: Terraform Format Check
        run: |
          cd terraform
          terraform fmt

      - name: Terraform Validate
        run: |
          cd terraform
          terraform validate

      - name: Terraform Plan
        run: |
          cd terraform
          terraform plan -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: |
          cd terraform
          terraform apply -auto-approve tfplan

      # Capture the Terraform output and save it to the job outputs map
      - name: Save Terraform Outputs
        id: get-outputs
        run: |
          cd terraform
          EC2_IP=$(terraform output -raw ec2_public_ip)
          echo "ec2_public_ip=$EC2_IP" >> $GITHUB_OUTPUT

      - name: Rollback on failure
        if: failure()
        run: |
          cd terraform
          terraform destroy -auto-approve

  # -------------------------------------------------------------
  # STAGE 2: Build, Scan, and Publish Containers
  # -------------------------------------------------------------
  build-and-publish:
    name: Containerize & Publish
    needs: infrastructure
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [frontend, backend]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/zuri-${{ matrix.component }}:${{ github.sha }} ./${{ matrix.component }}
          docker tag ${{ secrets.DOCKER_USERNAME }}/zuri-${{ matrix.component }}:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/zuri-${{ matrix.component }}:latest
          
      - name: Scan Container Image for Vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/zuri-${{ matrix.component }}:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Image to DockerHub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/zuri-${{ matrix.component }}:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/zuri-${{ matrix.component }}:latest

  # -------------------------------------------------------------
  # STAGE 3: Continuous Deployment to Kubernetes Cluster
  # -------------------------------------------------------------
  deploy:
    name: Kubernetes Deployment
    needs: [infrastructure, build-and-publish]
    runs-on: ubuntu-latest
  
    env:
      K3S_SECRET_NAME: ${{ secrets.K3S_SECRET_NAME }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ARN_TO_ASSUME }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Wait for EC2 Instance to be Ready
        run: sleep 60
        
       # ─── SECURE FIX: Dynamically authorize this specific runner IP right now ───
      - name: Authorize Runner IP in AWS Security Group
        run: |
          # This command dynamically adds your current runner IP into the firewall rules before scanning
          aws ec2 authorize-security-group-ingress \
            --group-name "zuriapp-sg" \
            --protocol tcp \
            --port 22 \
            --cidr "${{ needs.infrastructure.outputs.ec2_public_ip }}/32" || true
            
      - name: Wait for EC2 Instance to be Ready
        run: sleep 60
        
      # ─── STABLE FIX: Bypass strict keyscan check to avoid unexpected timing hangs ───
      - name: Create SSH Directory Safely
        shell: bash
        run: |
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          echo "${{ secrets.EC2_SSH_KEY }}" > "$HOME/.ssh/id_rsa"
          chmod 600 "$HOME/.ssh/id_rsa"

      - name: Fetch Remote Kubeconfig
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          # -o StrictHostKeyChecking=no lets SSH pass without hanging on ssh-keyscan rules
          ssh -o StrictHostKeyChecking=no ubuntu@${{ needs.infrastructure.outputs.ec2_public_ip }} "sudo cat /etc/rancher/k3s/k3s.yaml" > "$HOME/.kube/config"
          sed -i "s|127.0.0.1|${{ needs.infrastructure.outputs.ec2_public_ip }}|" "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Debug kubeconfig
        run: |
          ls -la ~/.kube
          kubectl config view
          kubectl config current-context || true

      - name: Verify Cluster
        run: |
          kubectl version --client
          kubectl cluster-info
          kubectl get nodes

      - name: Update Images
        run: |
          cd k8s
          
          # 1. Update the frontend image tag inside frontend.yml
          sed -i "s|image:.*zuri-frontend:.*|image: ${{ secrets.DOCKER_USERNAME }}/zuri-frontend:${{ github.sha }}|" frontend.yml

          # 2. Update the backend image tag inside backend.yml
          sed -i "s|image:.*zuri-backend:.*|image: ${{ secrets.DOCKER_USERNAME }}/zuri-backend:${{ github.sha }}|" backend.yml

      - name: Deploy
        run: |
          kubectl apply -f k8s/

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/zuri-frontend-deployment --timeout=5m
          kubectl rollout status deployment/zuri-backend-deployment --timeout=5m

      - name: Show Kubernetes Context
        run: |
          kubectl config current-context
          kubectl get ns

      - name: Rollback on failure
        if: failure()
        run: |
          kubectl rollout undo deployment/zuri-frontend-deployment || true
          kubectl rollout undo deployment/zuri-backend-deployment || true
