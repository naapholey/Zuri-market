      #     sed -i \
      #     "s|image:.*zuri-backend:.*|image: ${{ secrets.DOCKER_USERNAME }}/zuri-backend:${{ github.sha }}|" \
      #     deployment.yml

      - name: Deploy
        run: kubectl apply -f frontend.yml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/zuriapp-frontend --timeout=5m
          kubectl rollout status deployment/zuriapp-backend --timeout=5m
