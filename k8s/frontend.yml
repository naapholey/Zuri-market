apiVersion: apps/v1
kind: Deployment
metadata:
  name: zuriapp-frontend
  labels:
    app: zuriapp-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zuriapp-frontend
  template:
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
    metadata:
      labels:
        app: zuriapp-frontend
    spec:
      containers:
      - name: frontend
        image: naapholey/zuriapp-frontend1:linux
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        securityContext:
          seccompProfile:
            type: RuntimeDefault
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop:
              - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: zuriapp-frontend
spec:
  # CHANGED: Use ClusterIP instead of LoadBalancer. 
  # The Ingress controller exposes the app publicly now.
  type: ClusterIP 
  selector:
    app: zuriapp-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80