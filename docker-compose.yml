services:
  
  backend:
    build: ./backend
    image: naapholey/zuriapp_backend
    container_name: zuriapp_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    image: naapholey/zuriapp_frontend # Add this line
    container_name: zuriapp_frontend
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:5000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
