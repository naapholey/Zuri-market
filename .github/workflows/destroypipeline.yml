name: Secure Infrastructure Teardown

on:
  # Allows you to trigger the destroy manually from the Actions UI tab
  workflow_dispatch: 

jobs:
  # Job 1: Request approval from a human reviewer
  request-teardown:
    runs-on: ubuntu-latest
    # This points directly to the rule you created in Step 1
    environment: production-teardown 
    steps:
      - name: Confirmation Granted
        run: echo "Destroy request approved by an administrator. Starting cleanup..."

  # Job 2: Run the actual destroy only after Job 1 passes approval
  terraform-destroy:
    runs-on: ubuntu-latest
    needs: request-teardown # Ensures this won't run unless Job 1 is cleared
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Run Terraform Destroy
        run: |
          terraform init
          # The -auto-approve flag is safe here because GitHub handles the confirmation screen
          terraform destroy -auto-approve 
