apiVersion: apps/v1
kind: Deployment
metadata:
  name: zuriapp-backend
  labels:
    app: zuriapp-backend
spec:
  replicas: 2 # Scale requirement met
  selector:
    matchLabels:
      app: zuriapp-backend
  template:
    metadata:
      labels:
        app: zuriapp-backend
    spec:
      containers:
      - name: backend
        image: naapholey/zuriapp-backend1:linux
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "512Mi"
        ports:
        - containerPort: 5000
        # Self-healing config: monitors app availability
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop:
              - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: zuriapp-backend-service
spec:
  selector:
    app: zuriapp-backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000