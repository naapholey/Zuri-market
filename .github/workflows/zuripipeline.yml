  # # -------------------------------------------------------------
  # STAGE 3: Continuous Deployment to Kubernetes Cluster (Req 4)
  # -------------------------------------------------------------
  deploy:
    name: Kubernetes Deployment
    # needs: build-and-publish
    runs-on: ubuntu-latest

    env:
      K3S_SECRET_NAME: ${{ secrets.K3S_SECRET_NAME }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ARN_TO_ASSUME }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Wait for EC2 Instance to be Ready
        run: |
          echo "Waiting for EC2 instance to be fully ready..."
          sleep 60
        
      
      - name: Configure SSH
        run: |
           mkdir -p ~/.ssh
           echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
           chmod 600 ~/.ssh/id_rsa

      - name: Add EC2 host
        run: |
          ssh-keyscan -H 100.48.8.81 2>/dev/null >> ~/.ssh/known_hosts

      - name: Verify Cluster
        run: |
          kubectl version --client
          kubectl cluster-info
          kubectl get nodes

      # - name: Update Images
