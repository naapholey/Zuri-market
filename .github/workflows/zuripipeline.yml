name: Zuriapp CI/CD Pipeline

on:
  push:
    branches: [ main ]

permissions:
  id-token: write  # Required for OIDC AWS Auth
  contents: read   # Required to read repository code

jobs:
  # -------------------------------------------------------------
  # STAGE 1: Infrastructure Security Scan & Provisioning
  # -------------------------------------------------------------
  infrastructure:
    name: Terraform & Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # - name: Purge conflicting CloudWatch Log Group
      #   run: |
      #     aws logs delete-log-group --log-group-name "/aws/vpc-flow-logs/zuri-app-dev" || true
      #   env:
      #     AWS_REGION: us-east-1 # Change to your actual AWS region


      - name: Run Trivy vulnerability scanner in IaC mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          hide-progress: false
          format: 'table'
          exit-code: '0' # Fails the build if security issues are found

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ARN_TO_ASSUME }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Get GitHub Runner Public IP
        id: get-ip
        run: |
          # Fetch the public IP and save it as a variable
          RUNNER_IP=$(curl -s https://ifconfig.me)
          echo "Runner IP is $RUNNER_IP"
          
          # Write it directly into a Terraform variables file
          echo "runner_ssh_ip=\"${RUNNER_IP}/32\"" > terraform.tfvars

      - name: Terraform Init
        run: |
          cd terraform
          terraform init

      - name: Terraform Format Check
        run: |
          cd terraform
          terraform fmt

      - name: Terraform Validate
        run: |
          cd terraform
          terraform validate

      - name: Terraform Plan
        run: |
          cd terraform
          terraform plan -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: |
          cd terraform
          terraform apply -auto-approve tfplan
      - name: Rollback on failure
        if: failure()
        run: |
          cd terraform
          terraform destroy -auto-approve
  # -------------------------------------------------------------
  # STAGE 2: Build, Scan, and Publish Containers (Req 1 & 7)
  # -------------------------------------------------------------
  build-and-publish:
    name: Containerize & Publish
    needs: infrastructure
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [frontend, backend]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/zuri-${{ matrix.component }}:${{ github.sha }} ./${{ matrix.component }}
          docker tag ${{ secrets.DOCKER_USERNAME }}/zuri-${{ matrix.component }}:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/zuri-${{ matrix.component }}:latest
          docker image ls
          
      - name: Scan Container Image for Vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/zuri-${{ matrix.component }}:${{ github.sha }}
          format: 'table'
          exit-code: '0' # Fails the build if CRITICAL vulnerabilities are found
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Image to DockerHub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/zuri-${{ matrix.component }}:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/zuri-${{ matrix.component }}:latest

  # -------------------------------------------------------------
  # STAGE 3: Continuous Deployment to Kubernetes Cluster (Req 4)
  # -------------------------------------------------------------
  deploy:
    name: Kubernetes Deployment
    needs: [infrastructure, build-and-publish]
    runs-on: ubuntu-latest
  
    env:
      K3S_SECRET_NAME: ${{ secrets.K3S_SECRET_NAME }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ARN_TO_ASSUME }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Wait for EC2 Instance to be Ready
        run: |
          echo "Waiting for EC2 instance to be fully ready..."
          sleep 60
        
      - name: Create SSH Directory Safely
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          test -s ~/.kube/config

      - name: Add EC2 host
        run: |
          ssh-keyscan -H ${{ needs.infrastructure.outputs.ec2_public_ip}} 2>/dev/null >> ~/.ssh/known_hosts

      - name: Debug kubeconfig
        run: |
          ls -la ~/.kube
          kubectl config view
          kubectl config current-context || true

      - name: Verify Cluster
        run: |
          kubectl version --client
          kubectl cluster-info
          kubectl get nodes

      - name: Update Images
        run: |
          cd k8s

          sed -i \
          "s|image:.*zuri-frontend:.*|image: ${{ secrets.DOCKER_USERNAME }}/zuri-frontend:${{ github.sha }}|" \
          deployment.yml

          sed -i \
          "s|image:.*zuri-backend:.*|image: ${{ secrets.DOCKER_USERNAME }}/zuri-backend:${{ github.sha }}|" \
          deployment.yml

      - name: Wait for  Update Images
        run: |
          sleep 5

      - name: Deploy
        run: kubectl apply --dry-run=client -f k8s/

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/zuri-frontend-deployment --timeout=5m
          kubectl rollout status deployment/zuri-backend-deployment --timeout=5m

      - name: Show Kubernetes Context
        run: |
          kubectl config current-context
          kubectl get ns

      - name: Rollback on failure
        if: failure()
        run: |
          cd terraform
          terraform destroy -auto-approve
          kubectl rollout undo deployment/zuri-frontend-deployment
          kubectl rollout undo deployment/zuri-backend-deployment
