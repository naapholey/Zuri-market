name: Zuriapp CI/CD Pipeline

on:
  push:
    branches: [ main ]

permissions:
  id-token: write  # Required for OIDC AWS Auth
  contents: read   # Required to read repository code

jobs:
  # -------------------------------------------------------------
  # STAGE 1: Infrastructure Security Scan & Provisioning
  # -------------------------------------------------------------
  infrastructure:
    name: Terraform & Security
    runs-on: ubuntu-latest
    # Define outputs so STAGE 3 can actually read the EC2 IP address
    outputs:
      ec2_public_ip: ${{ steps.get-outputs.outputs.ec2_public_ip }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner in IaC mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          hide-progress: false
          format: 'sarif'
          severity: HIGH,CRITICAL
          exit-code: '1'
          output: 'trivy-report.sarif'

      - name: Upload Trivy Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.sarif
          
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ARN_TO_ASSUME }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Get GitHub Runner Public IP
        id: get-ip
        run: |
          RUNNER_IP=$(curl -s https://ifconfig.me)
          echo "Runner IP is $RUNNER_IP"
          # Write it directly into a Terraform variables file
          echo "runner_ssh_ip=\"${RUNNER_IP}/32\"" > terraform/terraform.tfvars

      - name: Terraform Init
        run: |
          cd terraform
          terraform init

      - name: Terraform Format Check
        run: |
          cd terraform
          terraform fmt

      - name: Terraform Validate
        run: |
          cd terraform
          terraform validate

      - name: Terraform Plan
        run: |
          cd terraform
          terraform plan -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: |
          cd terraform
          terraform apply -auto-approve tfplan

      - name: Save Terraform Outputs
        id: get-outputs
        run: |
          cd terraform
          # 1. Force a refresh so Terraform updates its state file with the real AWS IP
          terraform refresh
          
          # 2. Extract the true raw public IP address
          EC2_IP=$(terraform output -raw ec2_public_ip)
          echo "ec2_public_ip=$EC2_IP" >> $GITHUB_OUTPUT


      - name: Rollback on failure
        if: failure()
        run: |
          cd terraform
          terraform destroy -auto-approve

  # -------------------------------------------------------------
  # STAGE 2: Build, Scan, and Publish Containers
  # -------------------------------------------------------------
  build-and-publish:
    name: Containerize & Publish
    needs: infrastructure
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [frontend, backend]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/zuri-${{ matrix.component }}:${{ github.sha }} ./${{ matrix.component }}
          docker tag ${{ secrets.DOCKER_USERNAME }}/zuri-${{ matrix.component }}:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/zuri-${{ matrix.component }}:latest
          
      - name: Scan Container Image for Vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/zuri-${{ matrix.component }}:${{ github.sha }}
          format: 'sarif'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          output: 'trivy-${{ matrix.component }}-report.sarif'

      - name: Push Image to DockerHub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/zuri-${{ matrix.component }}:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/zuri-${{ matrix.component }}:latest

  # -------------------------------------------------------------
  # STAGE 3: Continuous Deployment to Kubernetes Cluster
  # -------------------------------------------------------------
  deploy:
    name: Kubernetes Deployment
    needs: [infrastructure, build-and-publish]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Debug workspace
        run: |
          echo "Current directory:"
          pwd

          echo "Repository contents:"
          ls -la

          echo "k8s directory:"
          ls -la ./k8s

      - name: Copy Kubernetes manifests to EC2
        run: |
          scp -r \
            -o StrictHostKeyChecking=no \
            ./k8s \
            ubuntu@${{ needs.infrastructure.outputs.ec2_public_ip }}:/home/ubuntu/

      - name: Deploy to K3s
        run: |
          ssh \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            ubuntu@${{ needs.infrastructure.outputs.ec2_public_ip }} <<'EOF'
          set -e

          export KUBECONFIG=/home/ubuntu/.kube/config

          echo "===== Cluster ====="
          kubectl get nodes

          echo "===== Manifests ====="
          ls -R /home/ubuntu/k8s

          echo "===== Deploying ====="
          kubectl apply -f /home/ubuntu/k8s/

          echo "===== Waiting for rollout ====="
          kubectl rollout status deployment/zuriapp-frontend --timeout=5m
          kubectl rollout status deployment/zuriapp-backend --timeout=5m

          echo "===== Pods ====="
          kubectl get pods -A

          echo "Deployment completed successfully."
          EOF